- name: Conditions
  hosts: web
  become: yes
  tasks: 
  - name: check user exist or not
    ansible.builtin.command: id expense
    register: USER
    ignore_errors: yes

  - name: print user info
    ansible.builtin.debug:
      msg: "User info is: {{USER}}"

  - name: create user
    ansible.builtin.command: useradd expense
    when: USER.rc !=0 

  - name: say Hello
    ansible.builtin.debug:
      msg: "Hello"
