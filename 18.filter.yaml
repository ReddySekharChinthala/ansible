- name: default value
  hosts: localhost
  tasks:
  - name: print default value
    ansible.builtin.debug:
      msg: "Hi, iam learning {{course | default('Ansible')}}"

- name: upper case
  hosts: localhost
  vars:
    greetings: "hello, good morning."
  tasks:
  - name: print the upper info in uppercase
    ansible.builtin.debug:
      msg: "{{greetings | upper}}"

- name: lower case
  hosts: localhost
  vars:
    Course: "DevOPs with AWS"
  tasks:
  - name: convert into lower case
    ansible.builtin.debug:
      msg: "{{Course | lower}}"

- name: remove duplicates
  hosts: localhost
  vars:
    numbers: [1, 2, 2, 3, 3, 4, 4, 5]
  tasks:
  - name: print unique numbers
    ansible.builtin.debug:
      msg: "{{numbers | unique}}"
      
- name: Max and mini ages
  hosts: localhost
  vars:
    age: [25, 35, 45, 50]
  tasks:
  - name: print maximum age ppl
    ansible.builtin.debug:
      msg: "{{age | max}}"

  - name: print minimum age ppl
    ansible.builtin.debug:
      msg: "{{age | min}}"

- name: convert dictionary into items/list
  hosts: localhost
  vars:
    my_dict:
      Course: "DevOps with AWS"
      Trainer: "Siva"
      Duration: "2 months" 
  tasks:
  - name: before convert
    ansible.builtin.debug:
      msg: "Before convert: {{ my_dict }}"

  - name: after convert
    ansible.builtin.debug:
      msg: "Before convert: {{ my_dict | dict2items }}"


- name: convert iteams into dictonary
  hosts: localhost
  vars:
    my_list:
      - "{'key': 'Course', 'value': 'DevOps with AWS'}"
      - "{'key': 'Trainer', 'value': 'Siva'}"
      - "{'key': 'Duration', 'value': '2 months'}"
  tasks:
  - name: before convert
    ansible.builtin.debug:
      msg: "Before convert: {{ my_list }}"

  - name: after convert
    ansible.builtin.debug:
      msg: "After convert: {{ my_list | iteam2dict }}"



